{{if ispage}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DMVCFramework - TemplatePro and HTMX</title>
    <!-- UIkit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.6.21/dist/css/uikit.min.css" />

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.6.21/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.6.21/dist/js/uikit-icons.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <style>
        li.htmx-swapping {
            opacity: 0;
            transition: opacity 1s ease-out;
        }
    </style>
    {{block "extraheaders"}}{{endblock}}
</head>

<body class="uk-background-secondary" uk-height-viewport>
    <div class="uk-navbar-container" uk-navbar>
        <div class="uk-navbar-center">
            <a href="" class="uk-navbar-item uk-logo">DMVCFramework - TemplatePro - HTMX</a>
        </div>
    </div>
    <div class="uk-container uk-flex uk-flex-center">
        {{endif}}
        {{block "body"}}{{endblock}}
        {{if ispage}}
    </div>

    <script>
        // Clear the "add" input only when a new item was actually appended to the list
        htmx.on('htmx:afterSwap', function (evt) {
            if (evt.detail.target && evt.detail.target.id === 'todoItems') {
                var input = document.getElementById("contentInput");
                if (input) { input.value = ""; }
            }
        });

        // Surface server errors (4xx/5xx) as a transient notification instead of failing silently.
        // htmx does not swap error-response bodies by default, so without this the user sees nothing.
        htmx.on('htmx:responseError', function (evt) {
            var status = (evt.detail.xhr && evt.detail.xhr.status) ? evt.detail.xhr.status : 0;
            var msg = 'Request failed';
            if (status === 404) { msg = 'Todo not found'; }
            else if (status === 422) { msg = 'Content cannot be empty'; }
            else if (status) { msg = 'Request failed (' + status + ')'; }
            UIkit.notification({
                message: '<span uk-icon="icon: warning"></span> ' + msg,
                status: 'danger',
                pos: 'top-center',
                timeout: 3000
            });
        });
    </script>
    <div style="text-align: center">{{:version}}</div>
</body>

</html>
{{endif}}
